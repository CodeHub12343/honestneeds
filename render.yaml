services:
  - type: web
    name: honestneeds
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start -- -H 0.0.0.0 -p ${PORT:-10000}
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --max-old-space-size=512
    routes:
      - path: /
        matchType: prefix
